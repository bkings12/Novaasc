# Add this upstream next to your existing "backend" and "frontend" (e.g. after "upstream backend"):
#
# upstream novaacs_api {
#     server 127.0.0.1:8080;
#     keepalive 64;
# }
#
# Then in the server block for api.unganishanetworks.com, change:
#   proxy_pass http://backend;
# to:
#   proxy_pass http://novaacs_api;
#
# So api.unganishanetworks.com hits the NovaACS Go API (port 8080), not the Nest backend (4000).
