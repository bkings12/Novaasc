# -------------------------------
# Upstream services
# -------------------------------
upstream frontend {
    server 127.0.0.1:5173;
    keepalive 64;
}

upstream backend {
    server 127.0.0.1:4000;
    keepalive 64;
}

upstream novaacs_api {
    server 127.0.0.1:8080;
    keepalive 64;
}

upstream novaacs_cwmp {
    server 127.0.0.1:7547;
    keepalive 64;
}

# -------------------------------
# Websocket support
# -------------------------------
map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

# -------------------------------
# Extract tenant from subdomain
# -------------------------------
map $host $tenant {
    default "";
    ~^(?<subdomain>[^.]+)\.unganishanetworks\.com$ $subdomain;
}

# -------------------------------
# API Rate limiting
# -------------------------------
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

# DEBUG: 1 = client sent Authorization, 0 = not sent (for testing header passthrough; remove in production)
map $http_authorization $auth_header_present {
    default 1;
    ""      0;
}

# -------------------------------
# HTTP → HTTPS redirect
# acs.unganishanetworks.com is intentionally excluded here — CPEs use plain HTTP for
# TR-069 and cannot follow HTTPS redirects. The dedicated ACS server block below
# handles port 80 for acs.unganishanetworks.com with higher priority (exact match
# wins over wildcard), but we also list the exclusion here for clarity.
# -------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name unganishanetworks.com
                ~^(?!acs\.)(?<sub>.+)\.unganishanetworks\.com$;

    return 301 https://$host$request_uri;
}

# -------------------------------
# ACS on port 80 (TR-069 CPEs typically use HTTP only)
# Frontend URL: http://acs.unganishanetworks.com/api/cwmp/<companyId>
# -------------------------------
server {
    listen 80;
    listen [::]:80;

    server_name acs.unganishanetworks.com 192.168.88.252;

    client_max_body_size 20M;

    # NovaACS TR-069 (Go app on 7547) — CPE ACS URL: http://acs.unganishanetworks.com/novaacs
    location /novaacs {
        limit_req zone=api_limit burst=20 nodelay;

        rewrite ^/novaacs/?(.*)$ /$1 break;
        proxy_pass http://novaacs_cwmp;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;

        proxy_connect_timeout 60s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        proxy_buffering on;
        proxy_buffer_size 64k;
        proxy_buffers 8 64k;
    }

    # Nest CWMP handler (existing devices, credentials, provisioning)
    location /api/cwmp {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # TR-069: CPEs authenticate with HTTP Basic — must pass Authorization header
        proxy_set_header Authorization $http_authorization;

        proxy_connect_timeout 60s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # TR-069: ensure SOAP response is fully buffered so CPE gets 200 OK
        proxy_buffering on;
        proxy_buffer_size 64k;
        proxy_buffers 8 64k;
    }

    # GenieACS CWMP handler — CPEs can connect here so GenieACS manages them directly
    # CPE ACS URL: http://acs.unganishanetworks.com/genieacs
    location /genieacs {
        # Strip /genieacs prefix — GenieACS CWMP listens on /
        rewrite ^/genieacs(/.*)$ $1 break;
        rewrite ^/genieacs$    /  break;

        proxy_pass http://127.0.0.1:8547;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;

        proxy_connect_timeout 60s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        proxy_buffering on;
        proxy_buffer_size 64k;
        proxy_buffers 8 64k;
    }

    location / {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}

# -------------------------------
# Backend API → api.unganishanetworks.com (NovaACS Go API on 8080)
# -------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name api.unganishanetworks.com;

    ssl_certificate     /etc/ssl/certs/dev.crt;
    ssl_certificate_key /etc/ssl/private/dev.key;

    client_max_body_size 20M;

    location / {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://novaacs_api;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Tenant $tenant;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /status {
        proxy_pass http://novaacs_api/status;
    }
}

# -------------------------------
# ACS (TR-069/CWMP) → acs.unganishanetworks.com
# Frontend shows: https://acs.unganishanetworks.com/api/cwmp/<companyId>
# Proxies to Nest backend (same as api subdomain).
# -------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name acs.unganishanetworks.com;

    ssl_certificate     /etc/ssl/certs/dev.crt;
    ssl_certificate_key /etc/ssl/private/dev.key;

    client_max_body_size 20M;

    # CWMP can have long-lived POSTs; allow longer timeouts for /api/cwmp
    location /api/cwmp {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # TR-069: CPEs authenticate with HTTP Basic — must pass Authorization header
        proxy_set_header Authorization $http_authorization;

        proxy_connect_timeout 60s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # TR-069: ensure SOAP response is fully buffered so CPE gets 200 OK
        proxy_buffering on;
        proxy_buffer_size 64k;
        proxy_buffers 8 64k;

        # DEBUG: uncomment to verify nginx receives Authorization; remove after testing
        # add_header X-Debug-Auth-Present $auth_header_present always;
    }

    location / {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Tenant $tenant;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /status {
        proxy_pass http://backend/status;
    }
}

# -------------------------------
# Main landing page → black.unganishanetworks.com
# -------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name black.unganishanetworks.com;

    ssl_certificate     /etc/ssl/certs/dev.crt;
    ssl_certificate_key /etc/ssl/private/dev.key;

    client_max_body_size 20M;

    # HTML documents must never be cached — chunk filenames change on every build.
    # Without this, browsers serve stale HTML referencing old chunk hashes → 404s.
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;

    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;

        # No tenant header for landing page
        proxy_set_header Host $host;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Static assets are content-hashed — safe to cache forever.
    # The add_header in the parent server block is overridden here.
    location /_next/static/ {
        proxy_pass http://frontend;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API calls from client portal on this host must reach the backend (Trigger connection, Reboot, etc.)
    location /api {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Tenant $tenant;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}

# -------------------------------
# Tenant subdomains → *.unganishanetworks.com
# -------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name *.unganishanetworks.com;

    ssl_certificate     /etc/ssl/certs/dev.crt;
    ssl_certificate_key /etc/ssl/private/dev.key;

    client_max_body_size 20M;

    # HTML documents must never be cached — chunk filenames change on every build.
    # Without this, browsers serve stale HTML referencing old chunk hashes → 404s.
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;

    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;

        # Pass tenant header for actual subdomains
        proxy_set_header Host $host;
        proxy_set_header X-Tenant $tenant;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Static assets are content-hashed — safe to cache forever.
    # The add_header in the parent server block is overridden here.
    location /_next/static/ {
        proxy_pass http://frontend;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API calls from client portal on tenant subdomains must reach the backend
    location /api {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Tenant $tenant;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
