services:
  go-acs:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "7547:7547"
      - "7567:7567"
      - "8080:8080"
    environment:
      - ACS_CWMP_PORT=7547
      - DATABASE_MONGO_URI=mongodb://mongodb:27017
      - DATABASE_MONGO_DB=novaacs
      - DATABASE_POSTGRES_DSN=postgres://acs:acs@postgres:5432/novaacs?sslmode=disable
      - DATABASE_REDIS_ADDR=redis:6379
      - NATS_URL=nats://nats:4222
      # ── Bridge auth ────────────────────────────────────────────────────
      # The billing backend (NestJS) signs short-lived HS256 JWTs with
      # NOVAACS_JWT_SECRET from billing/.env. NovaACS validates them
      # against auth.access_secret in config.yaml — Viper's AutomaticEnv
      # (`.` → `_`) lets us override that key with the AUTH_ACCESS_SECRET
      # env var. Both values MUST match or every billing → ACS request
      # fails with HTTP 401.
      #
      # ${NOVAACS_JWT_SECRET} is substituted by compose at parse time, so
      # it must be present in the .env file located in the SAME directory
      # as this compose file. The repo ships a symlink:
      #     backend/Novaacs/go-acs/docker/.env -> ../../../.env
      # which points at billing/.env. If the symlink is missing, recreate
      # it with:
      #     ln -sf ../../../.env backend/Novaacs/go-acs/docker/.env
      - AUTH_ACCESS_SECRET=${NOVAACS_JWT_SECRET:?NOVAACS_JWT_SECRET missing — see comment above and create docker/.env symlink to billing/.env}
    depends_on:
      - mongodb
      - postgres
      - redis
      - nats

  mongodb:
    image: mongo:7
    ports:
      - "27018:27017"   # 27018 on host to avoid conflict with local Mongo on 27017
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: acs
      POSTGRES_PASSWORD: acs
      POSTGRES_DB: novaacs
    ports:
      - "5434:5432"   # 5434 on host (5433 often used by other stacks, e.g. FreeRADIUS test DB)
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"   # 6380 on host (6379 often already used by system or other Redis)
    volumes:
      - redis_data:/data

  nats:
    image: nats:2-alpine
    ports:
      - "4222:4222"

volumes:
  mongodb_data:
  postgres_data:
  redis_data:
